<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test intégration iframe — Xeilom</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f4f4f5;
      }

      header {
        background: #1e293b;
        color: #fff;
        padding: 1rem 1.5rem;
      }

      .toolbar {
        max-width: 1200px;
        margin: 1rem auto 0;
        padding: 0 1rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .toolbar label {
        font-size: 0.875rem;
        color: #334155;
      }

      .configurateur-embed {
        max-width: 100%;
        margin: 1rem auto 1.5rem;
        padding: 0 1rem;
        overflow-x: clip;
      }

      .configurateur-embed iframe {
        width: 100%;
        max-width: 100%;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 3px rgb(0 0 0 / 12%);
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Simulation page Oxatis</strong> — test du configurateur en iframe
    </header>

    <div class="toolbar">
      <label for="pricing-tier">Catégorie client (Oxatis) :</label>
      <select id="pricing-tier" aria-label="Catégorie tarifaire">
        <option value="3394217">S — Particulier / public (3394217)</option>
        <option value="3394220">M (3394220)</option>
        <option value="3394218">B (3394218)</option>
        <option value="3394154">A (3394154)</option>
        <option value="3394219">Z — Pro le plus avantageux (3394219)</option>
      </select>
    </div>

    <div class="configurateur-embed">
      <iframe
        id="configurateur-coffret"
        src="/?embed=1"
        title="Configurateur coffrets XH'system"
        width="100%"
        style="border: 0; min-height: 720px; display: block; width: 100%"
        loading="lazy"
        allow="clipboard-write"
      ></iframe>
    </div>

    <script>
      (function () {
        var IFRAME_ORIGIN = window.location.origin;
        var frame = document.getElementById("configurateur-coffret");
        var tierSelect = document.getElementById("pricing-tier");
        var retryTimer = null;

        function sendPricingContext() {
          if (!frame || !frame.contentWindow) return;
          frame.contentWindow.postMessage(
            {
              type: "coffret-context",
              categoryId: tierSelect.value,
            },
            IFRAME_ORIGIN
          );
        }

        function startPricingContextRetry() {
          sendPricingContext();
          if (retryTimer) clearInterval(retryTimer);
          var attempts = 0;
          retryTimer = setInterval(function () {
            sendPricingContext();
            attempts += 1;
            if (attempts >= 20) clearInterval(retryTimer);
          }, 500);
        }

        if (frame) {
          frame.addEventListener("load", startPricingContextRetry);
        }
        tierSelect.addEventListener("change", sendPricingContext);

        window.addEventListener("message", function (event) {
          if (event.origin !== IFRAME_ORIGIN) return;
          if (!event.data || !event.data.type) return;

          if (event.data.type === "coffret-request-context") {
            sendPricingContext();
            return;
          }

          if (event.data.type === "coffret-resize" && event.data.height > 0) {
            frame.style.height = event.data.height + "px";
          }
        });
      })();
    </script>
  </body>
</html>
